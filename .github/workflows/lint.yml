name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash syntax check
        run: |
          bash -n linux_vuln_check.sh
          bash -n linux_vuln_fix.sh
          bash -n db_vuln_check.sh
          bash -n db_vuln_fix.sh

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck -S warning \
            linux_vuln_check.sh \
            linux_vuln_fix.sh \
            db_vuln_check.sh \
            db_vuln_fix.sh
