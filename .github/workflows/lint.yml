name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash syntax check
        run: |
          bash -n linux_vuln_check.sh
          bash -n linux_vuln_fix.sh
          bash -n db_vuln_check.sh
          bash -n db_vuln_fix.sh

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: tests
